
<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* BACKGROUND WITH FALLBACK */
body{
  font-family:'Poppins',sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('background.png'),
    url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  text-align:center;
}

/* SECTIONS */
.section{display:none;}
.section.active{display:block;animation:fade 0.4s ease;}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* GLASS */
.glass{
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,255,200,0.2);
}

/* BUTTON */
button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:black;
  cursor:pointer;
  font-weight:600;
}

/* CARD */
.card{
  margin:20px auto;
  padding:30px;
  width:280px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:scale(1.05)}

/* PROFILE */
#profile{
  position:absolute;
  top:20px;
  right:20px;
  padding:10px 15px;
  border-radius:20px;
}

/* RANKS */
.ranks-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  margin-top:20px;
}

.rank-box{
  width:320px;
  padding:20px;
  border-radius:15px;
  background:rgba(0,0,0,0.75);
  transition:0.3s;
}
.rank-box:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(0,255,200,0.4);
}

.rank-img{width:100%;height:100px;object-fit:contain;}

.perks{
  text-align:left;
  margin-top:12px;
  font-size:15px;
  line-height:1.8;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}

.kit-img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

/* COINS */
.coin-container{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
  margin-top:30px;
}

.coin{width:260px;padding:25px;transition:0.3s;}
.coin:hover{transform:scale(1.08)}
.coin img{width:120px;}

.featured{
  transform:scale(1.2);
  border:2px solid gold;
}

/* CART */
#cartBox{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px;
  width:260px;
  display:none;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:25px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="section active">
  <div id="profile" class="glass" onclick="show('login')">👤 Login</div>

  <div class="card glass" onclick="show('survival')">Survival</div>
  <div class="card glass" onclick="show('about')">About</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div id="loginBox" class="glass">
    <h2>Login</h2>
    <input type="text" id="ign" placeholder="Minecraft IGN">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="show('main')">Back</button>
  </div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="section">
  <button onclick="show('main')">⬅ Back</button>
  <div class="card glass" onclick="show('ranks')">Ranks</div>
  <div class="card glass" onclick="show('coinshop')">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
<button onclick="show('survival')">⬅ Back</button>

<div class="ranks-container">

  <div class="rank-box">
    <img class="rank-img" src="prime.png" onerror="this.src='https://via.placeholder.com/300x100?text=Prime'">
    <h3>Prime - ₹149</h3>
    <div class="perks">✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /home 3</div>
    <img src="prime-kit.png" class="kit-img" onerror="this.src='https://via.placeholder.com/300x150?text=Prime+Kit'">
    <button onclick="buyItem('Prime Rank',149)">Buy</button>
  </div>

  <div class="rank-box">
    <img class="rank-img" src="leorixplus.png" onerror="this.src='https://via.placeholder.com/300x100?text=Leorix+'">
    <h3>Leorix+ - ₹299</h3>
    <div class="perks">✔ /pv 1<br>✔ /ec<br>✔ /craft<br>✔ /anvil<br>✔ /hat<br>✔ /kit<br>✔ /home 7</div>
    <img src="leorix-kit.png" class="kit-img" onerror="this.src='https://via.placeholder.com/300x150?text=Leorix+Kit'">
    <button onclick="buyItem('Leorix+ Rank',299)">Buy</button>
  </div>

  <div class="rank-box">
    <img class="rank-img" src="mythic.png" onerror="this.src='https://via.placeholder.com/300x100?text=Mythic'">
    <h3>Mythic - ₹499</h3>
    <div class="perks">✔ /sit<br>✔ /ec<br>✔ /pv 1<br>✔ /anvil<br>✔ /home 5</div>
    <img src="mythic-kit.png" class="kit-img" onerror="this.src='https://via.placeholder.com/300x150?text=Mythic+Kit'">
    <button onclick="buyItem('Mythic Rank',499)">Buy</button>
  </div>

</div>
</div>

<!-- COIN SHOP -->
<div id="coinshop" class="section">
<button onclick="show('survival')">⬅ Back</button>

<div class="coin-container">

  <div class="coin glass">
    <img src="100coins.png" onerror="this.src='https://via.placeholder.com/150?text=100+Coins'">
    <h3>100 Coins</h3>
    <h2>₹49</h2>
    <button onclick="buyItem('100 Coins',49)">Buy</button>
  </div>

  <div class="coin glass featured">
    <img src="1000coins.png" onerror="this.src='https://via.placeholder.com/150?text=1000+Coins'">
    <h2>1000 Coins</h2>
    <h1>₹349</h1>
    <button onclick="buyItem('1000 Coins',349)">Buy</button>
  </div>

  <div class="coin glass">
    <img src="500coins.png" onerror="this.src='https://via.placeholder.com/150?text=500+Coins'">
    <h3>500 Coins</h3>
    <h2>₹199</h2>
    <button onclick="buyItem('500 Coins',199)">Buy</button>
  </div>

</div>
</div>

<!-- CART -->
<div id="cartBox" class="glass">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total">₹0</h4>
</div>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  let ign = document.getElementById("ign").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if(ign && email && pass){
    localStorage.setItem("ign", ign);
    localStorage.setItem("user", "logged");
    updateProfile();
    alert("Logged in as " + ign);
    show('main');
  } else alert("Fill all fields");
}

function logout(){
  localStorage.removeItem("ign");
  localStorage.removeItem("user");
  updateProfile();
  alert("Logged out");
}

function updateProfile(){
  let ign = localStorage.getItem("ign");
  document.getElementById("profile").innerText =
    ign ? "🎮 IGN: " + ign : "👤 Login";
}

window.onload = updateProfile;

let cart = [];

function buyItem(name, price){
  let ign = localStorage.getItem("ign");
  if(!ign){
    alert("Login first!");
    show('login');
    return;
  }

  cart.push({name, price, ign});
  updateCart();
  document.getElementById("cartBox").style.display="block";
}

function updateCart(){
  let total=0, html="";
  cart.forEach(i=>{
    html += `<div>${i.name} - ₹${i.price}<br><small>IGN: ${i.ign}</small></div><hr>`;
    total += i.price;
  });
  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "₹"+total;
}
</script>

</body>
</html>
