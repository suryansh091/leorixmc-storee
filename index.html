<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('background.png'),
    url('https://images.unsplash.com/photo-1605902711622-cfb43c4437d1');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  text-align:center;
}

.section{display:none;}
.section.active{display:block;}

.glass{
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(10px);
  border-radius:15px;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:black;
  cursor:pointer;
  font-weight:600;
}

.card{
  margin:20px auto;
  padding:30px;
  width:280px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:scale(1.05)}

#profile{
  position:absolute;
  top:20px;
  right:20px;
  padding:10px 15px;
  border-radius:20px;
}

.ranks-container, .coin-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  margin-top:20px;
}

.rank-box, .coin{
  width:300px;
  padding:20px;
  border-radius:15px;
  background:rgba(0,0,0,0.75);
  transition:0.3s;
}

.rank-box:hover, .coin:hover{
  transform:scale(1.05);
}

.rank-img{width:100%;height:100px;object-fit:contain;}

.perks{
  text-align:left;
  margin-top:10px;
  font-size:14px;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}

.kit-img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

#cartBox{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:15px;
  width:260px;
  display:none;
}

#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:25px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="profile" class="glass" onclick="show('login')">👤 Login</div>

<!-- MAIN -->
<div id="main" class="section active">
  <div class="card glass" onclick="show('survival')">Survival</div>
  <div class="card glass" onclick="show('about')">About</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <div id="loginBox" class="glass">
    <h2>Login</h2>
    <input id="ign" placeholder="Minecraft IGN">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="show('main')">Back</button>
  </div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="section">
  <button onclick="show('main')">⬅ Back</button>
  <div class="card glass" onclick="show('ranks')">Ranks</div>
  <div class="card glass" onclick="show('coinshop')">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="section">
<button onclick="show('survival')">⬅ Back</button>

<div class="ranks-container">

  <div class="rank-box">
    <img class="rank-img" src="prime.png">
    <h3>Prime - ₹149</h3>
    <div class="perks">✔ /sit ✔ /ec ✔ /home 3</div>
    <img src="prime-kit.png" class="kit-img">
    <button onclick="buyItem('Prime Rank',149)">Buy</button>
  </div>

  <div class="rank-box">
    <img class="rank-img" src="leorixplus.png">
    <h3>Leorix+ - ₹299</h3>
    <div class="perks">✔ /pv ✔ /ec ✔ /home 7</div>
    <img src="leorix-kit.png" class="kit-img">
    <button onclick="buyItem('Leorix+ Rank',299)">Buy</button>
  </div>

  <div class="rank-box">
    <img class="rank-img" src="mythic.png">
    <h3>Mythic - ₹499</h3>
    <div class="perks">✔ /sit ✔ /ec ✔ /home 5</div>
    <img src="mythic-kit.png" class="kit-img">
    <button onclick="buyItem('Mythic Rank',499)">Buy</button>
  </div>

</div>
</div>

<!-- COINS -->
<div id="coinshop" class="section">
<button onclick="show('survival')">⬅ Back</button>

<div class="coin-container">

  <div class="coin glass">
    <img src="100coins.png" width="120">
    <h3>100 Coins</h3>
    <button onclick="buyItem('100 Coins',49)">Buy</button>
  </div>

  <div class="coin glass">
    <img src="1000coins.png" width="120">
    <h2>1000 Coins</h2>
    <button onclick="buyItem('1000 Coins',349)">Buy</button>
  </div>

  <div class="coin glass">
    <img src="500coins.png" width="120">
    <h3>500 Coins</h3>
    <button onclick="buyItem('500 Coins',199)">Buy</button>
  </div>

</div>
</div>

<!-- CART -->
<div id="cartBox" class="glass">
  <h3>🛒 Cart</h3>
  <div id="cartItems"></div>
</div>

<script>
let user = {};
let cart = [];

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  let ign = document.getElementById("ign").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if(!ign || !email || !pass){
    alert("Fill all fields");
    return;
  }

  user = {ign,email};
  localStorage.setItem("user", JSON.stringify(user));
  updateProfile();
  alert("Logged in as " + ign);
  show('main');
}

function logout(){
  localStorage.removeItem("user");
  user = {};
  updateProfile();
}

function updateProfile(){
  let u = JSON.parse(localStorage.getItem("user"));
  document.getElementById("profile").innerText =
    u ? "🎮 " + u.ign : "👤 Login";
}

window.onload = updateProfile;

function buyItem(name, price){
  let u = JSON.parse(localStorage.getItem("user"));
  if(!u){
    alert("Login first!");
    show('login');
    return;
  }

  cart.push({name,price,ign:u.ign});
  updateCart();
  document.getElementById("cartBox").style.display="block";
}

function updateCart(){
  let html="";
  cart.forEach(i=>{
    html += `<div>${i.name} - ₹${i.price}<br>IGN: ${i.ign}</div><hr>`;
  });
  document.getElementById("cartItems").innerHTML = html;
}
</script>

</body>
</html>
