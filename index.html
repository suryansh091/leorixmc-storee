<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:#fff;
}

/* LOGO */
.top-logo{
  text-align:center;
  padding:30px;
}
.top-logo img{
  height:120px;
  filter:drop-shadow(0 0 20px #00ffcc);
}

/* BUTTONS */
.top-buttons{text-align:center}
.btn{
  padding:10px 15px;
  margin:5px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:40px;
}

/* CARD */
.card{
  padding:30px;
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00ffcc;
}

/* ITEMS */
.items{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  padding:30px;
}
.item{
  background:rgba(0,0,0,0.6);
  padding:20px;
  width:200px;
  border-radius:10px;
  text-align:center;
}

/* HIDDEN */
.hidden{display:none}

/* LOGIN */
.login{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  display:none;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- BUTTONS -->
<div class="top-buttons">
<button class="btn" onclick="toggleLogin()">Login</button>
</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h3>Admin Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button class="btn" onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" class="container">

<div class="card" onclick="showSurvival()">
<h2>Survival</h2>
</div>

<div class="card" onclick="showAbout()">
<h2>About</h2>
</div>

</div>

<!-- SURVIVAL MENU -->
<div id="survivalMenu" class="container hidden">

<div class="card" onclick="showRanks()">
<h2>Ranks</h2>
</div>

<div class="card" onclick="showCoins()">
<h2>Coin Shop</h2>
</div>

</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<div class="items">
<div class="item"><h3>Prime</h3><p>₹149</p></div>
<div class="item"><h3>Leorix+</h3><p>₹299</p></div>
<div class="item"><h3>Mythic</h3><p>₹499</p></div>
</div>
</div>

<!-- COINS -->
<div id="coins" class="hidden">
<div class="items">
<div class="item"><h3>100 Coins</h3><p>₹50</p></div>
<div class="item"><h3>500 Coins</h3><p>₹200</p></div>
<div class="item"><h3>1000 Coins</h3><p>₹350</p></div>
</div>
</div>

<!-- ABOUT -->
<div id="about" class="hidden" style="text-align:center;padding:40px;">
<h2>About Leorix MC</h2>
<p>Welcome to Leorix MC Server 🚀</p>
<p>Server IP: <b style="color:#00ffcc;">play.leorixmc.fun</b></p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaiP357SClEvOcQEm5Rz-X_9X1iXGrqic",
  authDomain: "leorixstore.firebaseapp.com",
  projectId: "leorixstore"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  let email=document.getElementById('email').value;
  let password=document.getElementById('password').value;

  signInWithEmailAndPassword(auth,email,password)
  .then(()=>{
    alert("Login Success");
    document.getElementById('loginBox').style.display='none';
  })
  .catch(()=>alert("Login Failed"));
}
</script>

<script>
function toggleLogin(){
  let box=document.getElementById('loginBox');
  box.style.display = box.style.display==='block'?'none':'block';
}

function showSurvival(){
  main.style.display='none';
  survivalMenu.style.display='grid';
}

function showRanks(){
  survivalMenu.style.display='none';
  ranks.style.display='block';
}

function showCoins(){
  survivalMenu.style.display='none';
  coins.style.display='block';
}

function showAbout(){
  main.style.display='none';
  about.style.display='block';
}
</script>

</body>
</html>
