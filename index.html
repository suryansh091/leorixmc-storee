<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leorix MC Store</title>

<style>
body{
  font-family:sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:white;
  text-align:center;
}

/* LOGO */
.top-logo img{height:120px}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}

/* HIDE */
.hidden{display:none}

/* CARDS */
.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  margin:20px;
  cursor:pointer;
}

/* ITEMS */
.item{
  background:rgba(0,0,0,0.6);
  margin:10px;
  padding:15px;
}

/* PROFILE */
#profile{
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="hidden" onclick="toggleEmail()">Your Account</div>
<div id="emailBox" class="hidden" style="position:absolute;top:50px;right:10px;background:black;padding:10px;"></div>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- LOGIN -->
<button onclick="toggleLogin()" id="loginBtn">Login</button>

<div id="loginBox" class="hidden">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main">
<div class="card" onclick="showSurvival()">Survival</div>
<div class="card" onclick="showAbout()">About</div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="hidden">
<button onclick="showMain()">Back</button>
<div class="card" onclick="showRanks()">Ranks</div>
<div class="card" onclick="showCoins()">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<button onclick="showSurvival()">Back</button>

<div class="item">Prime - ₹149</div>
<div class="item">Leorix+ - ₹299</div>
<div class="item">Mythic - ₹499</div>

</div>

<!-- COINS -->
<div id="coins" class="hidden">
<button onclick="showSurvival()">Back</button>

<div class="item">100 Coins - ₹50</div>
<div class="item">500 Coins - ₹200</div>
<div class="item">1000 Coins - ₹350</div>

</div>

<!-- ABOUT -->
<div id="about" class="hidden">
<button onclick="showMain()">Back</button>

<h2>play.leorixmc.fun</h2>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaiP357SClEvOcQEm5Rz-X_9X1iXGrqic",
  authDomain: "leorixstore.firebaseapp.com",
  projectId: "leorixstore"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>loginBox.style.display='none')
  .catch(e=>alert(e.message));
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    profile.classList.remove('hidden');
    loginBtn.style.display='none';
    emailBox.innerText=user.email;
  }
});
</script>

<!-- NAV -->
<script>
function hideAll(){
  main.style.display='none';
  survival.style.display='none';
  ranks.style.display='none';
  coins.style.display='none';
  about.style.display='none';
}

function showMain(){hideAll();main.style.display='block'}
function showSurvival(){hideAll();survival.style.display='block'}
function showRanks(){hideAll();ranks.style.display='block'}
function showCoins(){hideAll();coins.style.display='block'}
function showAbout(){hideAll();about.style.display='block'}

function toggleLogin(){
  loginBox.style.display = loginBox.style.display==='block'?'none':'block'
}

function toggleEmail(){
  emailBox.style.display = emailBox.style.display==='block'?'none':'block'
}
</script>

</body>
</html>
