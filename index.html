<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:#fff;
}

.hidden{display:none !important}

/* LOGO */
.top-logo{text-align:center;padding:20px;}
.top-logo img{height:120px;filter:drop-shadow(0 0 25px #00ffcc);}

/* HEADER */
.top-bar{text-align:center;margin-bottom:10px;}
.btn{
  padding:10px 15px;
  margin:5px;
  background:#00ffcc;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* PROFILE */
.profile{
  position:absolute;
  top:20px;
  right:20px;
  background:#111;
  padding:10px 15px;
  border-radius:8px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:40px;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}
.card:hover{box-shadow:0 0 20px #00ffcc;}

/* ITEMS */
.items{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  padding:30px;
}
.item{
  background:rgba(0,0,0,0.6);
  padding:20px;
  width:200px;
  border-radius:10px;
  text-align:center;
}

/* LOGIN */
.login{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  display:none;
  z-index:9999;
}
input{
  display:block;
  margin:10px auto;
  padding:10px;
}

/* BACK */
.back{
  margin:10px;
}
</style>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="profile hidden"></div>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- BUTTONS -->
<div class="top-bar">
<button class="btn" onclick="showMain()">Home</button>
<button class="btn" id="loginBtn" onclick="toggleLogin()">Login</button>
</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" class="container">
<div class="card" onclick="showSurvival()">Survival</div>
<div class="card" onclick="showAbout()">About</div>
</div>

<!-- SURVIVAL MENU -->
<div id="survivalMenu" class="container hidden">
<button class="btn back" onclick="showMain()">⬅ Back</button>

<div class="card" onclick="showRanks()">Ranks</div>
<div class="card" onclick="showCoins()">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<button class="btn back" onclick="showSurvival()">⬅ Back</button>

<div class="items">
<div class="item"><h3>Prime</h3><p>₹149</p></div>
<div class="item"><h3>Leorix+</h3><p>₹299</p></div>
<div class="item"><h3>Mythic</h3><p>₹499</p></div>
</div>
</div>

<!-- COINS -->
<div id="coins" class="hidden">
<button class="btn back" onclick="showSurvival()">⬅ Back</button>

<div class="items">
<div class="item"><h3>100 Coins</h3><p>₹50</p></div>
<div class="item"><h3>500 Coins</h3><p>₹200</p></div>
<div class="item"><h3>1000 Coins</h3><p>₹350</p></div>
</div>
</div>

<!-- ABOUT -->
<div id="about" class="hidden" style="text-align:center;padding:40px;">
<button class="btn back" onclick="showMain()">⬅ Back</button>

<h2>About Leorix MC</h2>
<p>Join and play our only server</p>
<p style="color:#00ffcc;font-weight:bold;">play.leorixmc.fun</p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* PUT YOUR REAL CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDaiP357SClEvOcQEm5Rz-X_9X1iXGrqic",
  authDomain: "leorixstore.firebaseapp.com",
  projectId: "leorixstore",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = function(){
  let email=emailInput.value;
  let password=passwordInput.value;

  signInWithEmailAndPassword(auth,email,password)
  .then(()=>{ alert("Logged in"); loginBox.style.display='none'; })
  .catch(err=>alert(err.message));
}

/* USER STATE */
onAuthStateChanged(auth,(user)=>{
  if(user){
    profile.innerText = user.email;
    profile.classList.remove('hidden');
    loginBtn.style.display='none';
  }
});
</script>

<!-- NAVIGATION -->
<script>
function hideAll(){
  main.style.display='none';
  survivalMenu.style.display='none';
  ranks.style.display='none';
  coins.style.display='none';
  about.style.display='none';
}

function showMain(){hideAll();main.style.display='grid';}
function showSurvival(){hideAll();survivalMenu.style.display='grid';}
function showRanks(){hideAll();ranks.style.display='block';}
function showCoins(){hideAll();coins.style.display='block';}
function showAbout(){hideAll();about.style.display='block';}

function toggleLogin(){
  loginBox.style.display = loginBox.style.display==='block'?'none':'block';
}
</script>

</body>
</html>
