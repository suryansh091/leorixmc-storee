<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<style>
body{
  font-family:sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:white;
  text-align:center;
}

/* LOGO */
.top-logo img{height:120px}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
  cursor:pointer;
}

/* HIDE */
.hidden{display:none}

/* CARD */
.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  margin:20px;
  cursor:pointer;
}

/* ITEM */
.item{
  background:rgba(0,0,0,0.6);
  padding:15px;
  margin:10px;
}

/* PROFILE */
#profile{
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="hidden" onclick="toggleEmail()">Your Account</div>
<div id="emailBox" class="hidden" style="position:absolute;top:50px;right:10px;background:black;padding:10px;"></div>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- LOGIN -->
<button onclick="toggleLogin()" id="loginBtn">Login</button>

<div id="loginBox" class="hidden">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main">
<div class="card" onclick="showSurvival()">Survival</div>
<div class="card" onclick="showAbout()">About</div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="hidden">
<button onclick="showMain()">Back</button>
<div class="card" onclick="showRanks()">Ranks</div>
<div class="card" onclick="showCoins()">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<button onclick="showSurvival()">Back</button>

<div class="item">Prime - ₹149</div>
<div class="item">Leorix+ - ₹299</div>
<div class="item">Mythic - ₹499</div>

</div>

<!-- COINS -->
<div id="coins" class="hidden">
<button onclick="showSurvival()">Back</button>

<div class="item">100 Coins - ₹50</div>
<div class="item">500 Coins - ₹200</div>
<div class="item">1000 Coins - ₹350</div>

</div>

<!-- ABOUT -->
<div id="about" class="hidden">
<button onclick="showMain()">Back</button>
<h2>play.leorixmc.fun</h2>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = function(){
  const emailInput = document.getElementById("email").value;
  const passInput = document.getElementById("password").value;

  signInWithEmailAndPassword(auth,emailInput,passInput)
  .then(()=> {
    alert("Logged in");
    document.getElementById("loginBox").style.display="none";
  })
  .catch(e=>alert(e.message));
}

/* USER STATE */
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("profile").classList.remove("hidden");
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("emailBox").innerText=user.email;
  }
});
</script>

<!-- NAVIGATION -->
<script>
function hideAll(){
  document.getElementById("main").style.display="none";
  document.getElementById("survival").style.display="none";
  document.getElementById("ranks").style.display="none";
  document.getElementById("coins").style.display="none";
  document.getElementById("about").style.display="none";
}

function showMain(){hideAll();document.getElementById("main").style.display="block";}
function showSurvival(){hideAll();document.getElementById("survival").style.display="block";}
function showRanks(){hideAll();document.getElementById("ranks").style.display="block";}
function showCoins(){hideAll();document.getElementById("coins").style.display="block";}
function showAbout(){hideAll();document.getElementById("about").style.display="block";}

function toggleLogin(){
  let box=document.getElementById("loginBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

function toggleEmail(){
  let box=document.getElementById("emailBox");
  box.style.display = box.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
