<<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:white;
  text-align:center;
}

/* GLASS EFFECT */
.glass{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

/* LOGO */
.top-logo{
  padding:20px;
}
.top-logo img{
  height:130px;
  filter:drop-shadow(0 0 25px #00ffcc);
  transition:0.3s;
}
.top-logo img:hover{
  transform:scale(1.1);
}

/* BUTTON */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:black;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00ffcc;
}

/* HIDE */
.hidden{display:none}

/* CARDS */
.card{
  margin:20px auto;
  padding:25px;
  width:250px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px #00ffcc;
}

/* ITEMS */
.item{
  margin:10px auto;
  padding:15px;
  width:250px;
  transition:0.3s;
}
.item:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00ffcc;
}

/* PROFILE */
#profile{
  position:absolute;
  top:15px;
  right:15px;
  background:#111;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* EMAIL BOX */
#emailBox{
  position:absolute;
  top:50px;
  right:15px;
  background:#111;
  padding:10px;
  border-radius:8px;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  padding:30px;
  border-radius:12px;
}

input{
  padding:10px;
  margin:8px;
  width:200px;
  border-radius:6px;
  border:none;
}

/* ABOUT STYLE */
.about-box{
  margin:40px auto;
  padding:30px;
  width:300px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #00ffcc;}
  to{box-shadow:0 0 30px #00ffcc;}
}
</style>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="hidden glass" onclick="toggleEmail()">Your Account</div>
<div id="emailBox" class="hidden glass"></div>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- LOGIN -->
<button onclick="toggleLogin()" id="loginBtn">Login</button>

<div id="loginBox" class="hidden glass">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main">
<div class="card glass" onclick="showSurvival()">Survival</div>
<div class="card glass" onclick="showAbout()">About</div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="hidden">
<button onclick="showMain()">⬅ Back</button>
<div class="card glass" onclick="showRanks()">Ranks</div>
<div class="card glass" onclick="showCoins()">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<button onclick="showSurvival()">⬅ Back</button>

<div class="item glass">Prime - ₹149</div>
<div class="item glass">Leorix+ - ₹299</div>
<div class="item glass">Mythic - ₹499</div>

</div>

<!-- COINS -->
<div id="coins" class="hidden">
<button onclick="showSurvival()">⬅ Back</button>

<div class="item glass">100 Coins - ₹50</div>
<div class="item glass">500 Coins - ₹200</div>
<div class="item glass">1000 Coins - ₹350</div>

</div>

<!-- ABOUT -->
<div id="about" class="hidden">
<button onclick="showMain()">⬅ Back</button>

<div class="about-box glass">
play.leorixmc.fun
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaiP357SClEvOcQEm5Rz-X_9X1iXGrqic",
  authDomain: "leorixstore.firebaseapp.com",
  projectId: "leorixstore"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,pass)
  .then(()=>{
    alert("Logged in");
    document.getElementById("loginBox").style.display="none";
  })
  .catch(e=>alert(e.message));
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("profile").classList.remove("hidden");
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("emailBox").innerText=user.email;
  }
});
</script>

<!-- NAV -->
<script>
function hideAll(){
  document.getElementById("main").style.display="none";
  document.getElementById("survival").style.display="none";
  document.getElementById("ranks").style.display="none";
  document.getElementById("coins").style.display="none";
  document.getElementById("about").style.display="none";
}

function showMain(){hideAll();main.style.display="block";}
function showSurvival(){hideAll();survival.style.display="block";}
function showRanks(){hideAll();ranks.style.display="block";}
function showCoins(){hideAll();coins.style.display="block";}
function showAbout(){hideAll();about.style.display="block";}

function toggleLogin(){
  let box=document.getElementById("loginBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

function toggleEmail(){
  let box=document.getElementById("emailBox");
  box.style.display = box.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
