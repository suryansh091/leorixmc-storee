<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:white;
  text-align:center;
}

/* GLASS */
.glass{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

/* BUTTON */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:black;
  cursor:pointer;
}

/* CARDS */
.card{
  margin:20px auto;
  padding:25px;
  width:250px;
  cursor:pointer;
}

/* ITEMS */
.item{
  margin:20px auto;
  padding:15px;
  width:260px;
}

/* FLEX */
.ranks-container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* PROFILE */
#profile{
  position:fixed;
  top:15px;
  right:20px;
  font-size:26px;
  cursor:pointer;
}

/* COINS */
.coin-box{
  width:280px;
  padding:20px;
}

.coin-box img{
  width:100%;
  border-radius:12px;
}

.price{
  font-size:28px;
  margin:10px 0;
  color:#00ffcc;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main">
  <div id="profile" onclick="toggleLogin()">👤</div>

  <div class="card glass" onclick="show('survival')">Survival</div>
  <div class="card glass" onclick="show('about')">About</div>
</div>

<!-- SURVIVAL -->
<div id="survival">
  <button onclick="show('main')">⬅ Back</button>
  <div class="card glass" onclick="show('ranks')">Ranks</div>
  <div class="card glass" onclick="show('coinshop')">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks">
<button onclick="show('survival')">⬅ Back</button>

<div class="ranks-container">
  <div class="item glass">
    <h3>Prime - ₹149</h3>
  </div>

  <div class="item glass">
    <h3>Leorix+ - ₹299</h3>
  </div>

  <div class="item glass">
    <h3>Mythic - ₹499</h3>
  </div>
</div>
</div>

<!-- COIN SHOP -->
<div id="coinshop">
  <button onclick="show('survival')">⬅ Back</button>

  <div class="ranks-container">

    <div class="item glass coin-box">
      <img src="./100coins.png">
      <h2>100 Coins</h2>
      <h1 class="price">₹49</h1>
      <button>Buy</button>
    </div>

    <div class="item glass coin-box">
      <img src="./500coins.png">
      <h2>500 Coins</h2>
      <h1 class="price">₹199</h1>
      <button>Buy</button>
    </div>

    <div class="item glass coin-box">
      <img src="./1000coins.png">
      <h2>1000 Coins</h2>
      <h1 class="price">₹349</h1>
      <button>Buy</button>
    </div>

  </div>
</div>

<!-- ABOUT -->
<div id="about">
  <button onclick="show('main')">⬅ Back</button>

  <div class="card glass">
    <h2>About Leorix SMP</h2>
    <p>
      Welcome to Leorix SMP — a fun survival server with ranks,
      economy and coin shop.
      <br><br>
      IP: <b>play.leorixmc.fun</b>
    </p>
  </div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="glass" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px;">
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
function show(id){
  document.getElementById("main").style.display="none";
  document.getElementById("survival").style.display="none";
  document.getElementById("ranks").style.display="none";
  document.getElementById("coinshop").style.display="none";
  document.getElementById("about").style.display="none";

  document.getElementById(id).style.display="block";
}

// DEFAULT PAGE
show("main");

// LOGIN UI
function toggleLogin(){
  let box=document.getElementById("loginBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

function login(){
  alert("Login working (Firebase optional)");
}
</script>

</body>
</html>
