



<!DOCTYPE html>
<html>
<head>
<title>Leorix MC Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:url('background.png') no-repeat center/cover fixed;
  color:white;
  text-align:center;
}

/* GLASS */
.glass{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

/* LOGO */
.top-logo{padding:20px;}
.top-logo img{
  height:130px;
  filter:drop-shadow(0 0 25px #00ffcc);
  transition:0.3s;
}
.top-logo img:hover{transform:scale(1.1);}

/* BUTTON */
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:black;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #00ffcc;
}

/* CARDS */
.card{
  margin:20px auto;
  padding:25px;
  width:250px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px #00ffcc;
}

/* ITEMS */
.item{
  margin:20px auto;
  padding:15px;
  width:260px;
  transition:0.3s;
}

.hidden{display:none}

/* PROFILE */
#profile{
  position:absolute;
  top:15px;
  right:15px;
  background:#111;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

#emailBox{
  position:absolute;
  top:60px;
  right:15px;
  background:#111;
  padding:10px;
  border-radius:8px;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  padding:30px;
  border-radius:12px;
}

input{
  padding:10px;
  margin:8px;
  width:200px;
  border-radius:6px;
  border:none;
}

/* ABOUT */
.about-box{
  margin:40px auto;
  padding:30px;
  width:300px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{box-shadow:0 0 10px #00ffcc;}
  to{box-shadow:0 0 30px #00ffcc;}
}

/* RANK STYLES */
.prime{border:1px solid #00ffcc;}
.leorix{border:1px solid #00ffaa;}
.mythic{border:1px solid #ff00ff;}

.perks{
  text-align:left;
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* RANK LAYOUT */
.ranks-container{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:20px;
  flex-wrap:wrap;
}

.ranks-container .leorix{
  transform:scale(1.1);
}

/* COINS */
.coins-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.coins-container .middle{
  transform:scale(1.1);
}
</style>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="hidden glass" onclick="toggleEmail()">Account</div>
<div id="emailBox" class="hidden glass"></div>

<!-- LOGO -->
<div class="top-logo">
<img src="logo.webp">
</div>

<!-- LOGIN -->
<button onclick="toggleLogin()" id="loginBtn">Login</button>
<button onclick="logout()" id="logoutBtn" class="hidden">Logout</button>

<div id="loginBox" class="hidden glass">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main">
<div class="card glass" onclick="show('survival')">Survival</div>
<div class="card glass" onclick="show('about')">About</div>
</div>

<!-- SURVIVAL -->
<div id="survival" class="hidden">
<button onclick="show('main')">⬅ Back</button>
<div class="card glass" onclick="show('ranks')">Ranks</div>
<div class="card glass" onclick="show('coins')">Coin Shop</div>
</div>

<!-- RANKS -->
<div id="ranks" class="hidden">
<button onclick="show('survival')">⬅ Back</button>

<div class="ranks-container">

  <!-- PRIME -->
  <div class="item glass prime">
    <img src="./prime.png" style="width:100%;border-radius:10px;">
    <h3>Prime - ₹149</h3>
    <div class="perks">✔ Prime Kit ✔ /sit ✔ /ec ✔ /pv 1 ✔ /home 3</div>
  </div>

  <!-- LEORIX+ (CENTER) -->
  <div class="item glass leorix">
    <img src="./leorixplus.png" style="width:100%;border-radius:10px;">
    <h3>Leorix+ - ₹299</h3>
    <div class="perks">✔ Leorix+ Kit ✔ /pv ✔ /ec ✔ /craft ✔ /kit ✔ /home 7</div>
  </div>

  <!-- MYTHIC -->
  <div class="item glass mythic">
    <img src="./mythic.png" style="width:100%;border-radius:10px;">
    <h3>Mythic - ₹499</h3>
    <div class="perks">✔ Mythic Kit ✔ /sit ✔ /ec ✔ /pv ✔ /home 5</div>
  </div>

</div>
</div>

<!-- COINS -->
<div id="coins" class="hidden">
<button onclick="show('survival')">⬅ Back</button>

<div class="coins-container">

<div class="item glass">
<img src="./100coins.png" style="width:100%;border-radius:10px;">
<h3>100 Coins - ₹50</h3>
</div>

<div class="item glass middle">
<img src="./1000coins.png" style="width:100%;border-radius:10px;">
<h3>1000 Coins - ₹350</h3>
</div>

<div class="item glass">
<img src="./500coins.png" style="width:100%;border-radius:10px;">
<h3>500 Coins - ₹200</h3>
</div>

</div>
</div>

<!-- ABOUT -->
<div id="about" class="hidden">
<button onclick="show('main')">⬅ Back</button>
<div class="about-box glass">play.leorixmc.fun</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "leorixstore.firebaseauth.com",
  projectId: "leorixstore"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,pass)
  .then(()=>alert("Logged in"))
  .catch(e=>alert(e.message));
}

window.logout = function(){
  signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("profile").classList.remove("hidden");
    document.getElementById("loginBtn").style.display="none";
    document.getElementById("logoutBtn").classList.remove("hidden");
    document.getElementById("emailBox").innerText=user.email;
  } else {
    document.getElementById("profile").classList.add("hidden");
    document.getElementById("loginBtn").style.display="inline-block";
    document.getElementById("logoutBtn").classList.add("hidden");
    document.getElementById("emailBox").innerText="";
  }
});
</script>

<script>
function show(id){
  document.querySelectorAll("#main,#survival,#ranks,#coins,#about")
  .forEach(e=>e.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function toggleLogin(){
  document.getElementById("loginBox").classList.toggle("hidden");
}

function toggleEmail(){
  document.getElementById("emailBox").classList.toggle("hidden");
}
</script>

</body>
</html>
